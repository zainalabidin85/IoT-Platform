<!doctype html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>EC Node - Wi-Fi Setup</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif}
    body{background:linear-gradient(135deg,#f5f7fa 0%,#e4edf5 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;color:#1d1d1f}
    .wrap{width:100%;max-width:420px}
    .card{background:rgba(255,255,255,0.95);border-radius:18px;padding:36px 32px;box-shadow:0 10px 30px rgba(0,0,0,0.08),inset 0 0 0 0.5px rgba(255,255,255,0.8);border:1px solid rgba(255,255,255,0.3)}
    h2{font-size:26px;font-weight:600;letter-spacing:-0.5px;margin-bottom:6px;text-align:center}
    .subtitle{color:#86868b;font-size:15px;text-align:center;margin-bottom:28px;line-height:1.4}
    .device-info{background:rgba(0,0,0,0.03);border-radius:12px;padding:14px;margin-bottom:24px;border:1px solid rgba(0,0,0,0.05);font-size:13px;color:#86868b}
    .device-info span{display:block;font-family:'SF Mono',Menlo,Monaco,Consolas,monospace;color:#1d1d1f;font-weight:500;margin-top:4px;font-size:14px;word-break:break-all}
    .form-group{margin-bottom:20px}
    label{display:block;font-size:13px;font-weight:500;margin-bottom:7px;color:#1d1d1f}
    input{width:100%;padding:15px 16px;font-size:16px;border-radius:12px;border:1px solid #d2d2d7;background:rgba(255,255,255,0.9);color:#1d1d1f;outline:none;transition:border-color 0.2s,box-shadow 0.2s}
    input:focus{border-color:#007aff;box-shadow:0 0 0 3px rgba(0,122,255,0.15)}
    input::placeholder{color:#c7c7cc}
    .pw{position:relative}
    .pw input{padding-right:52px}
    .eye{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:transparent;border:none;width:38px;height:38px;border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#8e8e93}
    .eye:hover{background:rgba(0,0,0,0.05)}
    .eye svg{width:21px;height:21px}
    .primary{width:100%;padding:17px;font-size:16px;font-weight:600;background:linear-gradient(135deg,#007aff,#0056d6);color:white;border:none;border-radius:13px;cursor:pointer;transition:all 0.2s;box-shadow:0 4px 14px rgba(0,122,255,0.3);margin-top:6px}
    .primary:hover{transform:translateY(-1px);box-shadow:0 6px 18px rgba(0,122,255,0.4)}
    .primary:active{transform:none}
    .hint{text-align:center;color:#86868b;font-size:14px;margin-top:24px;padding-top:20px;border-top:1px solid rgba(0,0,0,0.06);line-height:1.5}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h2>Set up Wi-Fi</h2>
      <p class="subtitle">Connect your EC Node to a wireless network</p>

      <div class="device-info">
        Device
        <span id="devName">EC-Node-...</span>
      </div>

      <form method="POST" action="/api/settings/wifi" id="wifiForm">
        <div class="form-group">
          <label for="ssid">Network Name</label>
          <input type="text" name="ssid" id="ssid" required placeholder="Enter Wi-Fi network name" autocomplete="off" autocorrect="off" autocapitalize="none">
        </div>
        <div class="form-group">
          <label for="pass">Password</label>
          <div class="pw">
            <input type="password" name="pass" id="pass" placeholder="Leave empty for open networks" autocomplete="off">
            <button type="button" class="eye" onclick="togglePass()" aria-label="Show password">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
        </div>
        <button type="submit" class="primary">Save &amp; Connect</button>
      </form>

      <p class="hint">After connecting, access the dashboard at the device IP or mDNS hostname</p>
    </div>
  </div>
  <script>
    function togglePass() {
      var p = document.getElementById('pass');
      p.type = p.type === 'password' ? 'text' : 'password';
    }
    fetch('/api/status').then(r => r.json()).then(d => {
      if (d.device && d.device.name) document.getElementById('devName').textContent = d.device.name + '.local';
    }).catch(() => {});
    document.getElementById('ssid').focus();
  </script>
</body>
</html>
