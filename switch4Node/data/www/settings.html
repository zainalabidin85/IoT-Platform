<!doctype html>
<html>
<head>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Settings · Switch4Node</title>
  <meta charset="UTF-8">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; }

    body {
      background: linear-gradient(135deg,#f5f7fa 0%,#e4edf5 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      color: #1d1d1f;
    }

    .wrap { width:100%; max-width:480px; }

    .card {
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(20px);
      border-radius: 20px;
      padding: 32px;
      box-shadow: 0 12px 40px rgba(0,0,0,0.08), inset 0 0 0 0.5px rgba(255,255,255,0.8);
      border: 1px solid rgba(255,255,255,0.3);
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 4px;
      background: linear-gradient(90deg,#34c759,#007aff,#ff3b30);
      opacity: 0.5;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 28px;
      padding-bottom: 16px;
      border-bottom: 1px solid rgba(0,0,0,0.06);
    }

    .header h2 {
      font-size: 24px;
      font-weight: 600;
      letter-spacing: -0.5px;
    }

    .badge {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 12px;
      background: rgba(0,0,0,0.03);
      border-radius: 30px;
      font-size: 13px;
      font-weight: 500;
      border: 1px solid rgba(0,0,0,0.05);
    }

    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #8e8e93;
    }
    .dot.connected { background:#34c759; box-shadow:0 0 0 2px rgba(52,199,89,0.2); animation:pulse 2s infinite; }
    .dot.error     { background:#ff3b30; }

    .section-title {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
    }
    .section-title::before {
      content: '';
      width: 4px; height: 16px;
      background: #007aff;
      border-radius: 2px;
      margin-right: 10px;
    }

    .form-group { margin-bottom: 20px; }

    label {
      display: block;
      font-size: 14px;
      font-weight: 500;
      margin-bottom: 8px;
    }

    input[type="text"],
    input[type="password"] {
      width: 100%;
      padding: 14px 16px;
      font-size: 15px;
      border-radius: 12px;
      border: 1px solid #d2d2d7;
      background: rgba(255,255,255,0.9);
      color: #1d1d1f;
      outline: none;
      transition: all 0.2s;
    }
    input:focus {
      border-color: #007aff;
      box-shadow: 0 0 0 4px rgba(0,122,255,0.12);
    }
    input::placeholder { color:#c7c7cc; }

    .pw { position:relative; }
    .pw input { padding-right: 52px; }
    .eye {
      position: absolute;
      right: 12px; top: 50%;
      transform: translateY(-50%);
      background: transparent;
      border: none;
      width: 36px; height: 36px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: #8e8e93;
    }
    .eye:hover { background:rgba(0,0,0,0.05); color:#1d1d1f; }

    .hint {
      font-size: 12px;
      color: #8e8e93;
      margin-top: 6px;
    }

    .btn {
      width: 100%;
      padding: 16px;
      font-size: 16px;
      font-weight: 600;
      background: linear-gradient(135deg,#007aff,#0056d6);
      color: white;
      border: none;
      border-radius: 14px;
      cursor: pointer;
      transition: all 0.25s;
      box-shadow: 0 4px 14px rgba(0,122,255,0.3);
      position: relative;
    }
    .btn:hover:not(:disabled) {
      background: linear-gradient(135deg,#0056d6,#0041a8);
      transform: translateY(-1px);
      box-shadow: 0 6px 18px rgba(0,122,255,0.4);
    }
    .btn:active:not(:disabled) { transform:translateY(0); }
    .btn:disabled { background:#c7c7cc; cursor:not-allowed; box-shadow:none; }

    .btn .btn-text { display:block; }
    .btn .loader   { display:none; }
    .btn.loading .btn-text { display:none; }
    .btn.loading .loader   { display:block; }

    .loader {
      width: 20px; height: 20px;
      border: 3px solid rgba(255,255,255,0.3);
      border-radius: 50%;
      border-top-color: white;
      animation: spin 0.8s linear infinite;
      margin: 0 auto;
    }

    .msg {
      padding: 12px 16px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 16px;
      display: none;
    }
    .msg.success { background:rgba(52,199,89,0.1);  color:#1a7f37; border:1px solid rgba(52,199,89,0.2);  display:block; }
    .msg.error   { background:rgba(255,59,48,0.1);  color:#ff3b30; border:1px solid rgba(255,59,48,0.2);  display:block; }
    .msg.info    { background:rgba(0,122,255,0.08); color:#007aff; border:1px solid rgba(0,122,255,0.15); display:block; }

    .status-card {
      background: rgba(0,0,0,0.02);
      border: 1px solid rgba(0,0,0,0.06);
      border-radius: 12px;
      padding: 14px 16px;
      font-size: 13px;
      color: #636366;
      margin-bottom: 24px;
      display: none;
    }
    .status-card.show { display:block; }
    .status-card strong { color:#1d1d1f; }

    .link {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      margin-top: 20px;
      padding: 14px;
      font-size: 15px;
      font-weight: 500;
      color: #007aff;
      text-decoration: none;
      border-radius: 12px;
      border: 1px solid transparent;
      transition: all 0.2s;
    }
    .link:hover { background:rgba(0,122,255,0.06); border-color:rgba(0,122,255,0.15); }
    .link svg { width:16px; height:16px; transition:transform 0.2s; }
    .link:hover svg { transform:translateX(-3px); }

    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
    @keyframes spin   { to{transform:rotate(360deg)} }

    @media(max-width:500px) {
      .card { padding:24px 18px; }
      .header { flex-direction:column; align-items:flex-start; gap:12px; }
    }
  </style>
</head>
<body>
<div class="wrap">
  <div class="card">

    <div class="header">
      <h2>Settings</h2>
      <div class="badge">
        <span id="dot" class="dot"></span>
        <span id="dotText">Loading…</span>
      </div>
    </div>

    <div class="section-title">Platform Connection</div>
    <p style="font-size:13px;color:#8e8e93;margin-bottom:20px;line-height:1.5;">
      Connect to <strong style="color:#1d1d1f;">iot.unitani.com</strong> — enter your topic and API key from the dashboard. MQTT credentials are configured automatically.
    </p>

    <div id="provStatus" class="msg"></div>
    <div id="statusCard" class="status-card"></div>

    <div class="form-group">
      <label for="topic">Device Name</label>
      <input type="text" id="topic" placeholder="e.g. myoffice-switch4">
      <div class="hint">Must match the Device Name you entered on the platform dashboard</div>
    </div>

    <div class="form-group">
      <label for="apikey">API Key</label>
      <div class="pw">
        <input type="password" id="apikey" placeholder="Paste API key from Settings → API Keys">
        <button type="button" class="eye" onclick="toggleKey()" aria-label="Show key">
          <svg viewBox="0 0 24 24" width="18" height="18"><path fill="currentColor" d="M12 5c-7 0-11 7-11 7s4 7 11 7 11-7 11-7-4-7-11-7zm0 11a4 4 0 1 1 0-8 4 4 0 0 1 0 8z"/></svg>
        </button>
      </div>
    </div>

    <button class="btn" id="provBtn" onclick="doProvision()">
      <span class="btn-text">Connect to Platform</span>
      <div class="loader"></div>
    </button>

    <a href="/" class="link">
      <svg viewBox="0 0 24 24"><path fill="currentColor" d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
      Back to Dashboard
    </a>
  </div>
</div>

<script>
(function() {
  function toggleKey() {
    const el = document.getElementById('apikey');
    el.type = el.type === 'password' ? 'text' : 'password';
  }

  function setMsg(text, type) {
    const el = document.getElementById('provStatus');
    el.textContent = text;
    el.className = 'msg ' + type;
  }

  function updateBadge(data) {
    const dot  = document.getElementById('dot');
    const text = document.getElementById('dotText');
    if (data.mqtt_connected) {
      dot.className = 'dot connected';
      text.textContent = 'Connected';
    } else if (data.mqtt_enabled) {
      dot.className = 'dot error';
      text.textContent = 'Disconnected';
    } else {
      dot.className = 'dot';
      text.textContent = 'Not configured';
    }

    const card = document.getElementById('statusCard');
    if (data.mqtt_enabled && data.cmd_topic) {
      card.innerHTML = 'Topic: <strong>' + data.cmd_topic + '</strong>';
      card.classList.add('show');
    }
  }

  async function fetchStatus() {
    try {
      const r = await fetch('/api/status');
      if (r.ok) updateBadge(await r.json());
    } catch(e) {}
  }

  async function doProvision() {
    const topic  = document.getElementById('topic').value.trim();
    const apikey = document.getElementById('apikey').value.trim();
    const btn    = document.getElementById('provBtn');

    if (!topic || !apikey) {
      setMsg('Topic and API key are required.', 'error');
      return;
    }

    btn.classList.add('loading');
    btn.disabled = true;
    document.getElementById('provStatus').className = 'msg';

    try {
      const fd = new FormData();
      fd.append('topic', topic);
      fd.append('api_key', apikey);
      const r = await fetch('/api/provision', { method:'POST', body:fd });
      const j = await r.json();

      if (j.ok) {
        setMsg('✓ Provisioned! MQTT credentials saved.', 'success');
        document.getElementById('apikey').value = '';
        setTimeout(fetchStatus, 1500);
      } else {
        setMsg('✗ Error: ' + (j.error || 'unknown'), 'error');
      }
    } catch(e) {
      setMsg('✗ Request failed: ' + e.message, 'error');
    } finally {
      btn.classList.remove('loading');
      btn.disabled = false;
    }
  }

  window.toggleKey = toggleKey;
  window.doProvision = doProvision;

  fetchStatus();
  setInterval(fetchStatus, 5000);
})();
</script>
</body>
</html>
